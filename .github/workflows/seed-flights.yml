name: Seed Flights DynamoDB

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview mode — print first 5 items without writing"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run seeder
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 scripts/seed_flights.py --dry-run
          else
            python3 scripts/seed_flights.py
          fi
